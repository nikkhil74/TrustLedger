services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trustledger}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trustledger}
      POSTGRES_DB: ${POSTGRES_DB:-trustledger}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustledger"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trustledger-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trustledger-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    expose:
      - "4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-trustledger}:${POSTGRES_PASSWORD:-trustledger}@postgres:5432/${POSTGRES_DB:-trustledger}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
      SCORE_ENGINE_URL: http://score-engine:5000
      CORS_ORIGINS: ${CORS_ORIGINS:-https://yourdomain.com}
      POLYGON_RPC_URL: ${POLYGON_RPC_URL:-https://rpc-amoy.polygon.technology}
      CHAIN_ID: ${CHAIN_ID:-80002}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trustledger-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    restart: unless-stopped
    command: ["node", "--import", "tsx", "apps/api/src/queue/workers/index.ts"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-trustledger}:${POSTGRES_PASSWORD:-trustledger}@postgres:5432/${POSTGRES_DB:-trustledger}
      REDIS_URL: redis://redis:6379
      SCORE_ENGINE_URL: http://score-engine:5000
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trustledger-net

  score-engine:
    build:
      context: ./apps/score-engine
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    environment:
      SCORE_ENGINE_HOST: "0.0.0.0"
      SCORE_ENGINE_PORT: 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trustledger-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://yourdomain.com}
    restart: unless-stopped
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - trustledger-net

  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp-bot
    restart: unless-stopped
    expose:
      - "4001"
    environment:
      NODE_ENV: production
      PORT: 4001
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:4000
    depends_on:
      - api
      - redis
    networks:
      - trustledger-net

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot-data:/var/www/certbot:ro
    depends_on:
      - web
      - api
    networks:
      - trustledger-net

  # Certbot for auto-renewing Let's Encrypt SSL
  certbot:
    image: certbot/certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - certbot-data:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  postgres-data:
  redis-data:
  certbot-data:

networks:
  trustledger-net:
    driver: bridge
