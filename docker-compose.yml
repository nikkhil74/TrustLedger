version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: trustledger
      POSTGRES_PASSWORD: trustledger
      POSTGRES_DB: trustledger
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trustledger"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trustledger-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trustledger-net

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://trustledger:trustledger@postgres:5432/trustledger
      REDIS_URL: redis://redis:6379
      JWT_SECRET: change-me-in-production
      SCORE_ENGINE_URL: http://score-engine:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - trustledger-net

  worker:
    build:
      context: .
      dockerfile: Dockerfile.api
    command: ["node", "--import", "tsx", "apps/api/src/queue/workers/index.ts"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://trustledger:trustledger@postgres:5432/trustledger
      REDIS_URL: redis://redis:6379
      SCORE_ENGINE_URL: http://score-engine:8000
      JWT_SECRET: change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      score-engine:
        condition: service_healthy
    networks:
      - trustledger-net

  score-engine:
    build:
      context: ./apps/score-engine
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      SCORE_ENGINE_HOST: "0.0.0.0"
      SCORE_ENGINE_PORT: 8000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - trustledger-net

  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile.whatsapp-bot
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:3001
    depends_on:
      - api
      - redis
    networks:
      - trustledger-net

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:3001
    depends_on:
      - api
    networks:
      - trustledger-net

volumes:
  postgres-data:
  redis-data:

networks:
  trustledger-net:
    driver: bridge
